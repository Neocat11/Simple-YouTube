<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Simple-YouTube</title>
    <link rel="stylesheet" href="src/popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <label class="toggle-row" for="enabled-toggle">
        <span class="toggle-label">SIMPLE YOUTUBEを有効化？</span>
        <input id="enabled-toggle" class="toggle-input" type="checkbox" role="switch" aria-label="SIMPLE YOUTUBEを有効化？">
        <span class="toggle-track" aria-hidden="true">
          <span class="toggle-thumb"></span>
        </span>
      </label>
    </main>
    <script src="src/popup.js"></script>
  </body>
</html>
